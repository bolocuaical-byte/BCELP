[alembic]
script_location = alembic

# Note: `sqlalchemy.url` is overridden at runtime by `alembic/env.py` which
# reads configuration from the application `settings` (recommended).
default_schema = public

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

[sqlalchemy]
url = driver://user:pass@localhost/dbname
