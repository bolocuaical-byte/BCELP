version: '3.9'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=BCELP Backend
      - APP_VERSION=0.1.0
      - ENVIRONMENT=development
      - POSTGRES_USER=bcelp_user
      - POSTGRES_PASSWORD=bcelp_password
      - POSTGRES_DB=bcelp_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql+psycopg2://bcelp_user:bcelp_password@postgres:5432/bcelp_db
      - JWT_SECRET_KEY=your-secret-key
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=60
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: bcelp_user
      POSTGRES_PASSWORD: bcelp_password
      POSTGRES_DB: bcelp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
